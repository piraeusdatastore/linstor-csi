name: tests
on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - v*

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go test ./...
  sanity:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Install LVM tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lvm2 thin-provisioning-tools
      - name: Run CSI sanity suite against LINSTOR
        run: make sanity
