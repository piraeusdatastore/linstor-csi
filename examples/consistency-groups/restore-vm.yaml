# Restore VM 1's consistency group into a fresh VM. This is the mirror of vm1-disks.yaml: each PVC has a member
# VolumeSnapshot as its data source AND a NEW consistency-group label, so the restored disks form a new shared
# resource. The first PVC provisioned restores the whole resource; each member then claims the volume number
# recorded in its snapshot. Keep a restored group all-restored — do not mix in fresh members. (Restoring from a
# group snapshot is the ONLY content source a consistency-group member accepts; a plain clone is rejected, which
# is why the VMs' original root disks are host-assisted copies of the golden rather than CSI clones.)
#
# The per-member VolumeSnapshot names are generated by the snapshotter from the VolumeGroupSnapshot. Find them:
#   kubectl get volumegroupsnapshot fedora-vm-1-snapshot \
#     -o jsonpath='{.status.pvcVolumeSnapshotRefList[*].volumeSnapshotRef.name}'
# then substitute below. The PVC sizes must match the snapshots' source volumes.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fedora-vm-1-root-restored
  labels:
    linstor.csi.linbit.com/consistency-group: fedora-vm-1-restored
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Block
  storageClassName: linstor-cg
  resources:
    requests:
      storage: 10Gi
  dataSource:
    apiGroup: snapshot.storage.k8s.io
    kind: VolumeSnapshot
    name: REPLACE-with-root-member-volumesnapshot   # see header
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fedora-vm-1-data-restored
  labels:
    linstor.csi.linbit.com/consistency-group: fedora-vm-1-restored
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Block
  storageClassName: linstor-cg
  resources:
    requests:
      storage: 5Gi
  dataSource:
    apiGroup: snapshot.storage.k8s.io
    kind: VolumeSnapshot
    name: REPLACE-with-data-member-volumesnapshot   # see header
